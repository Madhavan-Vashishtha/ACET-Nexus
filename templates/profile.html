{% extends "base.html" %}
{% block content %}

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script>
    tailwind.config = { theme: { extend: { colors: { brand: '#4361ee', darkBg: '#0b1120' } } } }
</script>

<div class="min-h-screen bg-[#f8fafc] pt-[100px] pb-12 px-4 sm:px-6">
    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
        
        <div class="bg-slate-800 p-6 sm:px-10 sm:py-8 flex items-center justify-between">
            <button id="btnBackToDash" class="text-slate-400 hover:text-white flex items-center gap-2 font-bold transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </button>
            <h1 class="text-white font-black text-xl tracking-wide uppercase">My Profile</h1>
        </div>

        <div class="p-6 sm:p-10">
            <div class="flex flex-col sm:flex-row items-center sm:items-start gap-8 mb-10 border-b border-slate-100 pb-8">
                <div class="relative group">
                    <div id="profileImageDisplay" class="w-32 h-32 rounded-2xl bg-slate-100 flex items-center justify-center text-4xl font-black text-slate-400 border border-slate-200 overflow-hidden shadow-sm">
                        </div>
                    <label for="profilePicInput" class="absolute -bottom-3 -right-3 w-10 h-10 bg-brand text-white rounded-xl shadow-md border-2 border-white flex items-center justify-center cursor-pointer hover:scale-105 transition-transform">
                        <i class="fa-solid fa-camera"></i>
                        <input type="file" id="profilePicInput" class="hidden" accept="image/*">
                    </label>
                </div>
                <div class="text-center sm:text-left">
                    <h2 id="userNameDisplay" class="text-2xl font-black text-slate-800">Loading...</h2>
                    <p id="userRoleBadge" class="inline-block bg-slate-100 text-slate-500 font-bold text-[10px] px-3 py-1 rounded-md uppercase tracking-widest mt-2 border border-slate-200">Role</p>
                </div>
            </div>

            <div class="space-y-8">
                <div>
                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 border-l-4 border-brand pl-3">Personal Details</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Full Name</label>
                            <input type="text" id="inpFullName" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-brand font-bold text-slate-700">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Email Address</label>
                            <input type="email" id="inpEmail" class="w-full bg-slate-100 border border-slate-200 p-3.5 rounded-xl font-bold text-slate-500 cursor-not-allowed" disabled>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Mobile Number</label>
                            <input type="text" id="inpPhone" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-brand font-bold text-slate-700" placeholder="+91 xxxxxxxxxx">
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Full Address</label>
                            <textarea id="inpAddress" rows="3" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-brand font-medium text-slate-700 resize-none" placeholder="Enter your full address..."></textarea>
                        </div>
                    </div>
                </div>

                <div id="roleSpecificSection">
                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 border-l-4 border-brand pl-3">Role Specific Details</h3>
                    
                    <div id="studentFields" class="hidden grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Enrollment Number</label>
                            <input type="text" id="inpEnrollment" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-brand font-bold text-slate-700" placeholder="e.g. EN123456">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Roll Number</label>
                            <input type="text" id="inpRollNo" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-brand font-bold text-slate-700" placeholder="e.g. 45">
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Registration Number</label>
                            <input type="text" id="inpRegNo" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-brand font-bold text-slate-700" placeholder="e.g. REG-2024-XX">
                        </div>
                    </div>

                    <div id="teacherFields" class="hidden">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Department</label>
                            <input type="text" id="inpDept" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-brand font-bold text-slate-700" placeholder="e.g. Computer Science">
                        </div>
                    </div>

                    <div id="adminFields" class="hidden">
                        <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl">
                            <p class="text-xs text-blue-700 font-bold"><i class="fa-solid fa-shield-halved mr-2"></i> You have root administrator privileges. Additional details are not required.</p>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 pt-6 border-t border-slate-100">
                    <button id="btnSaveProfile" class="flex-1 bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-slate-900 transition-colors active:scale-95 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-floppy-disk"></i> Save Profile
                    </button>
                    <button id="btnResetPassword" class="flex-1 bg-white text-slate-600 border border-slate-200 font-bold py-3.5 rounded-xl shadow-sm hover:bg-slate-50 transition-colors active:scale-95 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-key"></i> Send Password Reset Link
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>

<div id="toastContainer" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

<script type="module" src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
