<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ACET Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: '#4f46e5', darkBg: '#0b132b' } } }
        }
    </script>
    <style>
        body { background-color: #f8faff; }
        .locked-field { background-color: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex items-start md:items-center justify-center min-h-screen p-4 md:p-6 text-slate-800 text-sm">

    <div class="bg-white w-full max-w-4xl rounded-3xl shadow-[0_8px_30px_rgba(0,0,0,0.06)] overflow-hidden border border-slate-100">
        
        <div class="bg-gradient-to-r from-brand to-indigo-800 h-32 md:h-40 relative">
            <button id="btnBackToDashboard" class="absolute top-4 left-4 bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-xl backdrop-blur-md font-medium transition flex items-center gap-2 text-xs md:text-sm shadow-sm">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </button>
        </div>

        <div class="px-6 md:px-10 pb-10 relative">
            
            <div class="flex flex-col md:flex-row md:justify-between items-center md:items-end -mt-12 md:-mt-16 mb-8 gap-4 text-center md:text-left">
                <div class="relative">
                    <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User&background=eff6ff&color=4f46e5" alt="Profile" class="w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-white shadow-lg bg-white object-cover">
                    <div class="absolute bottom-1 right-1 bg-brand text-white w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center border-2 border-white shadow-sm cursor-pointer hover:scale-105 transition">
                        <i class="fa-solid fa-camera text-xs md:text-sm"></i>
                    </div>
                </div>
                <div class="flex flex-wrap justify-center md:justify-end gap-2 md:gap-3 items-center mb-2">
                    <span id="roleBadge" class="bg-indigo-100 text-brand px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-indigo-200">Loading...</span>
                    <span id="statusBadge" class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider border border-emerald-200">Active</span>
                </div>
            </div>

            <div class="mb-8 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <div class="flex justify-between text-xs mb-2">
                    <span class="font-bold text-slate-600">Profile Completion</span>
                    <span id="profilePercent" class="font-black text-brand">0%</span>
                </div>
                <div class="w-full bg-slate-200 h-2.5 rounded-full overflow-hidden">
                    <div id="profileBar" class="bg-gradient-to-r from-brand to-indigo-400 h-2.5 rounded-full transition-all duration-500 shadow-sm" style="width: 0%"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 md:p-5">
                    <p class="text-[10px] md:text-xs uppercase font-bold text-brand mb-1">Department / Sec</p>
                    <p id="profDepartment" class="font-black text-slate-800 text-sm md:text-base">Updating...</p>
                </div>
                <div class="bg-purple-50/50 border border-purple-100 rounded-2xl p-4 md:p-5">
                    <p id="idLabel" class="text-[10px] md:text-xs uppercase font-bold text-purple-600 mb-1">ID Number</p>
                    <p id="profEnrollment" class="font-black text-slate-800 text-sm md:text-base">Updating...</p>
                </div>
                <div class="col-span-2 md:col-span-1 bg-orange-50/50 border border-orange-100 rounded-2xl p-4 md:p-5">
                    <p class="text-[10px] md:text-xs uppercase font-bold text-orange-600 mb-1">Joined Date</p>
                    <p id="profJoined" class="font-black text-slate-800 text-sm md:text-base">Updating...</p>
                </div>
            </div>

            <h2 class="text-xl font-black text-slate-800 mb-6 border-b border-slate-100 pb-3">Personal Information</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Full Name <span class="text-red-400 font-normal normal-case ml-1">(Locked)</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400 text-xs"></i>
                        <input type="text" id="profName" disabled class="locked-field w-full border border-slate-200 py-3 pl-10 pr-4 rounded-xl font-medium">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Email Address <span class="text-red-400 font-normal normal-case ml-1">(Locked)</span></label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400 text-xs"></i>
                        <input type="email" id="profEmail" disabled class="locked-field w-full border border-slate-200 py-3 pl-10 pr-4 rounded-xl font-medium">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Phone Number</label>
                    <input type="text" id="profPhone" placeholder="+91 XXXXX XXXXX" class="w-full bg-white border border-slate-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-brand focus:border-brand transition font-medium">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Date of Birth</label>
                    <input type="date" id="profDob" class="w-full bg-white border border-slate-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-brand focus:border-brand transition font-medium text-slate-600">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">My Section</label>
                    <input type="text" id="profSection" placeholder="e.g. CS-1A" class="w-full bg-white border border-slate-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-brand focus:border-brand transition font-medium uppercase">
                </div>
            </div>

            <div class="grid grid-cols-1 gap-6 mb-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Residential Address</label>
                    <input type="text" id="profAddress" placeholder="Enter your full address" class="w-full bg-white border border-slate-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-brand focus:border-brand transition font-medium">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Bio / About Me</label>
                    <textarea id="profBio" rows="3" placeholder="Write a short bio about yourself..." class="w-full bg-white border border-slate-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-brand focus:border-brand transition resize-none font-medium"></textarea>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase mb-2 block">Profile Picture URL</label>
                    <input type="text" id="profPicUrl" placeholder="https://example.com/my-photo.jpg" class="w-full bg-white border border-slate-300 p-3 rounded-xl outline-none focus:ring-2 focus:ring-brand focus:border-brand transition font-medium mb-2">
                    <div class="bg-blue-50 border border-blue-100 p-3 rounded-lg flex gap-3 items-start">
                        <i class="fa-solid fa-circle-info text-brand mt-0.5"></i>
                        <p class="text-xs text-blue-800">Paste a direct image link (ending in .jpg or .png) to update your avatar. It will preview automatically.</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col-reverse md:flex-row justify-end gap-3 md:gap-4 border-t border-slate-100 pt-6">
                <button id="changePassBtn" class="bg-slate-100 text-slate-600 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition text-sm md:text-base w-full md:w-auto">
                    Reset Password
                </button>
                <button id="btnSaveProfile" class="bg-brand text-white px-8 py-3 rounded-xl font-bold shadow-[0_4px_15px_rgba(79,70,229,0.4)] hover:bg-indigo-700 transition flex items-center justify-center gap-2 text-sm md:text-base w-full md:w-auto">
                    <i class="fa-solid fa-floppy-disk"></i> Save Profile
                </button>
            </div>

        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/profile.js') }}"></script>
</body>
</html>
