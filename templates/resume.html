{% extends "base.html" %}
{% block content %}

<style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* Standard CSS replacement for @apply */
    .input-box { 
        width: 100%; 
        background-color: #ffffff; 
        border: 1px solid #cbd5e1; 
        border-radius: 0.5rem; 
        padding: 0.625rem 1rem; 
        outline: none; 
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        font-size: 0.875rem; 
        color: #1e293b; 
    }
    .input-box:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 1px #3b82f6;
    }
    .input-box::placeholder {
        color: #94a3b8;
    }

    .label-text { 
        font-size: 0.75rem; 
        font-weight: 600; 
        color: #475569; 
        text-transform: uppercase; 
        letter-spacing: 0.05em; 
        margin-bottom: 0.375rem; 
        display: block; 
    }

    .section-title { 
        font-size: 1.125rem; 
        font-weight: 700; 
        color: #1e293b; 
        border-bottom: 1px solid #e2e8f0; 
        padding-bottom: 0.75rem; 
        margin-bottom: 1.5rem; 
    }
    
    @media print {
        body * { visibility: hidden; }
        #generatedResumeContainer, #generatedResumeContainer * { visibility: visible; }
        #generatedResumeContainer { position: absolute; left: 0; top: 0; width: 100%; }
        #printControls { display: none !important; }
    }
</style>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="min-h-screen pt-36 pb-20 px-4 sm:px-6 lg:px-8" id="builderView">
    <div class="max-w-5xl mx-auto">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900">Resume Builder</h1>
            <button onclick="window.history.back()" class="bg-white text-slate-600 px-4 py-2 rounded-lg shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors text-sm font-medium">
                Dashboard
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 sticky top-28">
                    <div class="flex items-center gap-4 mb-6">
                        <div id="resAvatar" class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-xl font-bold text-blue-600 overflow-hidden shrink-0">
                            S
                        </div>
                        <div class="overflow-hidden">
                            <h2 id="resName" class="text-lg font-bold text-slate-800 truncate">Loading...</h2>
                            <p class="text-xs text-slate-500">Candidate Profile</p>
                        </div>
                    </div>
                    
                    <div class="space-y-3">
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-0.5">Email</p>
                            <p class="text-sm font-medium text-slate-700 truncate" id="resEmail">...</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-0.5">Phone</p>
                            <p class="text-sm font-medium text-slate-700 truncate" id="resPhone">...</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-0.5">Location</p>
                            <p class="text-sm font-medium text-slate-700" id="resAddress">...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 sm:p-8">
                    <h3 class="section-title">Professional Summary</h3>
                    <div>
                        <label class="label-text">Summary</label>
                        <textarea id="inpObjective" rows="4" class="input-box resize-none" placeholder="Summary..."></textarea>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 sm:p-8">
                    <h3 class="section-title">Education Details</h3>
                    
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="label-text">College</label>
                                <input type="text" id="inpCollege" class="input-box" placeholder="College Name">
                            </div>
                            <div>
                                <label class="label-text">Degree</label>
                                <input type="text" id="inpDegree" class="input-box" placeholder="Degree">
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <label class="label-text mb-0">Semesters (CGPA)</label>
                                <button id="btnAddSem" class="text-xs text-blue-600 hover:text-blue-700 font-semibold flex items-center gap-1">
                                    <i class="fa-solid fa-plus"></i> Add Sem
                                </button>
                            </div>
                            <div id="semestersContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                </div>
                        </div>

                        <hr class="border-slate-100">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-3">
                                <label class="label-text">Class 12th</label>
                                <input type="text" id="inpSchool12" class="input-box" placeholder="School Name">
                                <input type="text" id="inpPerc12" class="input-box" placeholder="Percentage">
                            </div>
                            <div class="space-y-3">
                                <label class="label-text">Class 10th</label>
                                <input type="text" id="inpSchool10" class="input-box" placeholder="School Name">
                                <input type="text" id="inpPerc10" class="input-box" placeholder="Percentage">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 sm:p-8">
                    <div class="flex justify-between items-center border-b border-slate-200 pb-3 mb-6">
                        <h3 class="text-lg font-bold text-slate-800">Experience</h3>
                        <button id="btnAddExp" class="text-xs bg-slate-100 text-slate-600 hover:bg-slate-200 px-3 py-1.5 rounded-md font-semibold transition-colors flex items-center gap-1">
                            <i class="fa-solid fa-plus"></i> Add
                        </button>
                    </div>
                    
                    <div id="experienceContainer" class="space-y-6">
                        </div>
                </div>

                <div class="flex justify-end pt-2">
                    <button id="btnGenerate" class="bg-blue-600 text-white font-semibold px-6 py-3 rounded-lg shadow-sm hover:bg-blue-700 transition-colors flex items-center gap-2 text-sm">
                        Generate Resume
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>

<div id="outputView" class="hidden min-h-screen pt-24 pb-20 bg-slate-900 px-4 sm:px-6">
    <div class="max-w-4xl mx-auto">
        <div id="printControls" class="flex justify-between items-center mb-6">
            <button id="btnBackToEdit" class="text-slate-300 hover:text-white font-medium transition-colors flex items-center gap-2 text-sm">
                <i class="fa-solid fa-arrow-left"></i> Edit Details
            </button>
            <button onclick="window.print()" class="bg-white text-slate-900 px-5 py-2 rounded-lg font-semibold shadow-sm hover:bg-slate-100 transition-colors text-sm flex items-center gap-2">
                <i class="fa-solid fa-print"></i> Print PDF
            </button>
        </div>

        <div id="generatedResumeContainer" class="bg-white shadow-2xl rounded-md w-full min-h-[1122px] overflow-hidden mx-auto">
            </div>
    </div>
</div>

<div id="toastContainer" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

<script type="module" src="{{ url_for('static', filename='js/resume.js') }}"></script>
{% endblock %}
